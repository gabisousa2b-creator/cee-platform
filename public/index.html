<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plateforme CEE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    :root { --primary: #1D4ED8; --green: #059669; }
    body { background: linear-gradient(135deg, #EFF6FF 0%, #F0FDF4 100%); min-height: 100vh; font-family: 'Segoe UI', system-ui, sans-serif; }
    .logo-box { width: 88px; height: 88px; background: linear-gradient(135deg, var(--primary), var(--green)); border-radius: 24px; display: flex; align-items: center; justify-content: center; font-size: 2.6rem; color: #fff; margin: 0 auto 24px; box-shadow: 0 8px 32px rgba(29,78,216,.25); }
    .brand { font-size: 2.6rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .access-card { border: none; border-radius: 20px; box-shadow: 0 4px 24px rgba(0,0,0,.08); transition: transform .2s, box-shadow .2s; text-decoration: none; color: inherit; display: block; background: #fff; }
    .access-card:hover { transform: translateY(-6px); box-shadow: 0 16px 48px rgba(0,0,0,.14); color: inherit; }
    .icon-wrap { width: 68px; height: 68px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 1.9rem; color: #fff; margin: 0 auto 18px; }
    .icon-admin { background: linear-gradient(135deg, #1D4ED8, #1E40AF); }
    .icon-benef { background: linear-gradient(135deg, #059669, #047857); }
    .badge-info { background: #EFF6FF; color: #1D4ED8; border-radius: 20px; padding: 4px 14px; font-size: .8rem; font-weight: 600; }
  </style>
</head>
<body>
<div class="container py-5">
  <div class="text-center mb-5">
    <div class="logo-box"><i class="fas fa-bolt"></i></div>
    <h1 class="brand mb-1">Plateforme CEE</h1>
    <p class="text-muted fs-5">Certificats d'Économies d'Énergie — Gestion des dossiers</p>
  </div>

  <div class="row justify-content-center g-4">
    <div class="col-md-6 col-lg-5">
      <a href="/portal.html" class="access-card">
        <div class="p-4 text-center">
          <div class="icon-wrap icon-benef"><i class="fas fa-folder-open"></i></div>
          <h3 class="fw-bold mb-2">Espace Bénéficiaire</h3>
          <p class="text-muted mb-3">Accédez à votre dossier avec votre <strong>code unique</strong> et déposez vos pièces justificatives en toute sécurité.</p>
          <div class="mb-4">
            <span class="badge-info me-1"><i class="fas fa-file-pdf me-1"></i>KBIS / RNE</span>
            <span class="badge-info me-1"><i class="fas fa-file me-1"></i>Liasse fiscale</span>
            <span class="badge-info"><i class="fas fa-certificate me-1"></i>URSSAF</span>
          </div>
          <span class="btn btn-success px-5 py-2 rounded-pill fw-semibold">Accéder <i class="fas fa-arrow-right ms-2"></i></span>
        </div>
      </a>
    </div>
  </div>

  <div class="text-center mt-5 text-muted small">
    Plateforme CEE &copy; 2024 — Certificats d'Économies d'Énergie
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
